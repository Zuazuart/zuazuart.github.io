/* GLOBAL */

body {
    margin: 0;
    background-color: #0C0C0F;
    color: #F2F2F2;
    font-family: 'Inter', sans-serif;
}

h1, h2 {
    font-family: 'Cormorant Garamond', serif;
    letter-spacing: 4px;
    text-align: center;
}

p {
    color: #A9A9A9;
    text-align: center;
}

a {
    color: #BFA15A;
    text-decoration: none;
}

/* HEADER */

header {
    text-align: center;
    padding: 25px;
    border-bottom: 1px solid #BFA15A;
}

nav a {
    margin: 10px;
    font-size: 13px;
    text-transform: uppercase;
}

/* HERO */

.hero {
    min-height: 75vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('REPLACE IMAGE') center/cover no-repeat;

    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* SECTIONS */

.section {
    padding: 70px 8%;
}

.section-title {
    margin-bottom: 40px;
}

/* GRID */

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
}

.grid img {
    width: 100%;
    height: auto;
    display: block;
}

/* CTA */

.cta {
    background-color: #151519;
    text-align: center;
    padding: 80px 20px;
}

.btn {
    border: 1px solid #BFA15A;
    padding: 14px 30px;
    margin-top: 20px;
    display: inline-block;
    text-transform: uppercase;
    letter-spacing: 2px;
}

/* FOOTER */

.footer {
    text-align: center;
    padding: 40px;
    font-size: 13px;
    color: #A9A9A9;
}

/* TABLET */

@media(max-width:1024px){
    .grid {
        grid-template-columns: repeat(2,1fr);
    }
}

/* MOBILE */

@media(max-width:768px){
    .grid {
        grid-template-columns: 1fr;
    }
}

</style>
</head>
